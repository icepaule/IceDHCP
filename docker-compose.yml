version: '3'

services:
  netalertx:
    image: ghcr.io/jokob-sk/netalertx:latest
    container_name: netalertx
    restart: unless-stopped
    network_mode: host
    environment:
      - TZ=${TZ:-Europe/Berlin}
      - PORT=${PORT:-20211}
    volumes:
      - ./config:/app/config
      - ./db:/app/db
      - ./logs:/app/front/log
    # Port 20211 wird im Host-Modus direkt am Host geöffnet
